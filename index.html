<!DOCTYPE html>
<html>
<head>
  <title>Python Runner</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
</head>

<body>
<textarea id="code" rows="6" cols="40">print("ok")</textarea>
<button onclick="runPython()">Run</button>

<pre id="output"></pre>

<script>
  let pyodide;
  let ready = false;

  async function loadPython() {
    pyodide = await loadPyodide();
    ready = true;
  }

  loadPython();

  async function runPython() {
    if (!ready) {
      document.getElementById("output").innerText = "Python is loading...";
      return;
    }

    const code = document.getElementById("code").value;

    try {
      const result = await pyodide.runPythonAsync(code);
      document.getElementById("output").innerText = result ?? "";
    } catch (err) {
      document.getElementById("output").innerText = "Error:\n" + err;
    }
  }
</script>
</body>
</html>
